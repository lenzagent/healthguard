name: HealthGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Type check & lint (single platform, fast feedback) ──
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

  # ── Cross-platform build verification ──
  build:
    name: Build (${{ matrix.os }})
    needs: typecheck
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build

      - name: Verify build output
        shell: bash
        run: |
          echo "=== Build output verification ==="
          if [ -d ".next" ]; then
            BUILD_SIZE=$(du -sm .next 2>/dev/null | cut -f1 || echo "unknown")
            echo "✓ .next directory exists (${BUILD_SIZE}MB)"
          else
            echo "✗ .next directory missing"
            exit 1
          fi

          # Check for PWA assets
          if [ -d "public" ]; then
            echo "✓ public/ directory present"
          fi

          # Verify build size < 500MB
          if [ -n "$BUILD_SIZE" ] && [ "$BUILD_SIZE" -gt 500 ]; then
            echo "✗ Build size ${BUILD_SIZE}MB exceeds 500MB limit"
            exit 1
          else
            echo "✓ Build size within 500MB limit"
          fi

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: .next/
          retention-days: 7

  # ── Unit & component tests ──
  test:
    name: Tests (${{ matrix.os }})
    needs: typecheck
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── E2E tests (single platform, uses Playwright browsers) ──
  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Lighthouse audit ──
  lighthouse:
    name: Lighthouse Audit
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start server
        run: pnpm start &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: npx wait-on http://localhost:3000 -t 30000

      - name: Run Lighthouse
        run: |
          npx lighthouse http://localhost:3000 \
            --output=json --output=html \
            --chrome-flags="--headless --no-sandbox" \
            --only-categories=performance,accessibility,best-practices

      - name: Verify Lighthouse scores
        run: |
          PERFORMANCE=$(jq '.categories.performance.score * 100' lighthouse-*.json)
          ACCESSIBILITY=$(jq '.categories.accessibility.score * 100' lighthouse-*.json)
          BEST_PRACTICES=$(jq '.["categories"]["best-practices"].score * 100' lighthouse-*.json)
          echo "Performance: $PERFORMANCE"
          echo "Accessibility: $ACCESSIBILITY"
          echo "Best Practices: $BEST_PRACTICES"
          if (( $(echo "$PERFORMANCE < 90" | bc -l) )); then
            echo "✗ Performance score ${PERFORMANCE} < 90"
            exit 1
          fi
          if (( $(echo "$ACCESSIBILITY < 90" | bc -l) )); then
            echo "✗ Accessibility score ${ACCESSIBILITY} < 90"
            exit 1
          fi
          if (( $(echo "$BEST_PRACTICES < 90" | bc -l) )); then
            echo "✗ Best Practices score ${BEST_PRACTICES} < 90"
            exit 1
          fi
          echo "✓ All Lighthouse scores ≥ 90"
